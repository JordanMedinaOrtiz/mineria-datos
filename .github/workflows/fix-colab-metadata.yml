name: Fix Colab Notebook Metadata

on:
  push:
    paths:
      - '**.ipynb'

permissions:
  contents: write

jobs:
  clean-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove invalid metadata.widgets
        run: |
          find . -name "*.ipynb" -exec sh -c 'jq "del(.metadata.widgets)" "{}" > tmp.ipynb && mv tmp.ipynb "{}"' \;

      - name: Robust Commit and Push with Retry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add .
          
          git commit -m "Auto-fix: Remove invalid metadata.widgets from Colab" || { echo "No changes to commit"; exit 0; }
          
          for i in {1..5}; do
            echo "Intento de push $i..."
            
            git pull --rebase origin main
            
            if git push origin HEAD:main; then
              echo "¡Push exitoso!"
              exit 0
            fi
            
            echo "Colisión detectada. Esperando 5 segundos antes de reintentar..."
            sleep 5
          done
          
          echo "Error: Imposible hacer push después de múltiples intentos."
          exit 1
