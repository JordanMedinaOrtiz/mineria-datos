name: Fix Colab Notebook Metadata

on:
  push:
    paths:
      - '**.ipynb'

permissions:
  contents: write

jobs:
  clean-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Remove invalid metadata.widgets
        run: |
          find . -name "*.ipynb" -exec sh -c 'jq "del(.metadata.widgets)" "{}" > tmp.ipynb && mv tmp.ipynb "{}"' \;

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-fix: Remove invalid metadata.widgets from Colab"
          branch: main
