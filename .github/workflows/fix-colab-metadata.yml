name: Fix Colab Notebook Metadata

on:
  push:
    paths:
      - '**.ipynb'

permissions:
  contents: write

jobs:
  clean-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove invalid metadata.widgets
        run: |
          find . -name "*.ipynb" -exec sh -c 'jq "del(.metadata.widgets)" "{}" > tmp.ipynb && mv tmp.ipynb "{}"' \;

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-fix: Remove invalid metadata.widgets from Colab" || echo "No changes to commit"
          
          git pull --rebase origin HEAD
          
          git push
